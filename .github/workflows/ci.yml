name: CI

on:
  push:
    branches: ["main", "ralph/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────
  # 安全：密钥/凭据泄露扫描（Gitleaks）
  # ─────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # 扫描完整历史

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # 安全：依赖漏洞审计（pip-audit + npm audit）
  # ─────────────────────────────────────────
  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Python dependency audit (pip-audit)
        working-directory: backend
        run: |
          pip install pip-audit --quiet
          pip-audit --requirement <(pip install -e ".[dev]" --dry-run -q 2>/dev/null || true) || \
          pip-audit --pyproject pyproject.toml --skip-editable || true
        continue-on-error: true   # 首次引入，不阻断 CI

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Node dependency audit (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true   # 首次引入，不阻断 CI

  # ─────────────────────────────────────────
  # 后端：Lint（ruff）+ 类型检查（mypy）+ 单元测试（pytest）
  # ─────────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ai_usage_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libldap2-dev libsasl2-dev

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"

      - name: Lint — ruff check
        working-directory: backend
        run: ruff check .

      - name: Lint — ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: Type check — mypy
        working-directory: backend
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true   # 首次引入，不阻断 CI

      - name: Unit tests — pytest
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_usage_test
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # 前端：ESLint + TypeScript 类型检查 + 构建
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (Node 24)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint — ESLint
        working-directory: frontend
        run: npm run lint

      - name: Type check — vue-tsc
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        run: npm run build
