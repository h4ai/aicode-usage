working_hours:
  start: "08:30"   # 工作时段开始（24h格式，服务器本地时区）
  end: "18:00"     # 工作时段结束
  enabled: true    # false = 统计全天（00:00~23:59），不限时段
  # 工作时段 = 周一至周五 start~end，周六日全天视为非工作时段
