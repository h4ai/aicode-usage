services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_usage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"   # 5432=skillhub, 5433=trellis, 5434=ai-code-usage
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_usage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./backend/config.yaml:/app/config.yaml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 后端地址配置：内网部署时修改为实际后端 IP/域名
      # 例如：BACKEND_URL: http://192.168.1.100:8002
      - BACKEND_URL=http://backend:8002

volumes:
  pgdata:
