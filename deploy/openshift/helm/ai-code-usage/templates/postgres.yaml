apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-code-usage.fullname" . }}-pgdata
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
  {{- if .Values.postgres.storageClassName }}
  storageClassName: {{ .Values.postgres.storageClassName }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-code-usage.fullname" . }}-postgres
  labels:
    app: {{ include "ai-code-usage.fullname" . }}
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "ai-code-usage.fullname" . }}
      component: postgres
  template:
    metadata:
      labels:
        app: {{ include "ai-code-usage.fullname" . }}
        component: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ai_usage
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-code-usage.fullname" . }}-secret
                  key: postgres-password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: {{ include "ai-code-usage.fullname" . }}-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-code-usage.fullname" . }}-postgres
spec:
  selector:
    app: {{ include "ai-code-usage.fullname" . }}
    component: postgres
  ports:
    - port: 5432
      targetPort: 5432
