apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-code-usage.fullname" . }}-frontend
  labels:
    app: {{ include "ai-code-usage.fullname" . }}
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ include "ai-code-usage.fullname" . }}
      component: frontend
  template:
    metadata:
      labels:
        app: {{ include "ai-code-usage.fullname" . }}
        component: frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 3002
          env:
            - name: BACKEND_URL
              value: http://{{ include "ai-code-usage.fullname" . }}-backend:8002
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-code-usage.fullname" . }}-frontend
spec:
  selector:
    app: {{ include "ai-code-usage.fullname" . }}
    component: frontend
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "ai-code-usage.fullname" . }}-frontend
spec:
  {{- if .Values.route.host }}
  host: {{ .Values.route.host }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "ai-code-usage.fullname" . }}-frontend
  port:
    targetPort: 3002
  {{- if .Values.route.tls }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  {{- end }}
